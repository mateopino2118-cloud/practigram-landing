<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A/B Testing Dashboard - Practigram</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05050a;color:#e0e0e0;font-family:'Inter',system-ui,sans-serif;min-height:100vh}
.top-bar{background:#0a0a14;border-bottom:1px solid #1a1a2e;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;backdrop-filter:blur(10px)}
.top-bar h1{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.top-bar h1 b{color:#8b5cf6}
.top-bar .right{display:flex;align-items:center;gap:12px;font-size:12px;color:#666}
.top-bar .live{display:inline-flex;align-items:center;gap:6px}
.top-bar .live::before{content:'';width:8px;height:8px;border-radius:50%;background:#16a34a;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.filter-bar{background:#0a0a14;border-bottom:1px solid #1a1a2e;padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-bar label{font-size:12px;font-weight:600;color:#888;letter-spacing:0.5px}
.filter-bar input[type="date"]{background:#111122;border:1px solid #2a2a3e;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:13px;font-family:inherit}
.filter-bar input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
.filter-btn{padding:6px 16px;border-radius:6px;border:1px solid #2a2a3e;background:#1a1a2e;color:#aaa;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s}
.filter-btn:hover{background:#2a2a3e;color:#fff}
.filter-btn.green{background:#16a34a;color:#fff;border-color:#16a34a}
.filter-btn.source-btn.active{background:#8b5cf6;color:#fff;border-color:#8b5cf6}
.container{max-width:1200px;margin:0 auto;padding:24px}
.hero-conv{background:linear-gradient(135deg,#0d0d1a 0%,#1a0d2e 100%);border:1px solid #2a1a4e;border-radius:16px;padding:32px;margin-bottom:24px;text-align:center}
.hero-conv .hero-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#8b5cf6;margin-bottom:16px}
.hero-conv .hero-numbers{display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap}
.hero-conv .hero-num{text-align:center}
.hero-conv .hero-num .big{font-size:48px;font-weight:900;letter-spacing:-2px;line-height:1}
.hero-conv .hero-num .sub{font-size:13px;color:#888;margin-top:6px}
.hero-conv .hero-arrow{font-size:28px;color:#555}
.hero-conv .hero-rate{text-align:center}
.hero-conv .hero-rate .big{font-size:56px;font-weight:900;letter-spacing:-2px;line-height:1}
.hero-conv .hero-rate .big.green{color:#16a34a}
.hero-conv .hero-rate .big.amber{color:#f59e0b}
.hero-conv .hero-rate .sub{font-size:13px;color:#888;margin-top:6px}
.hero-conv .date-range-label{font-size:12px;color:#555;margin-top:16px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
.kpi{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:12px;padding:20px}
.kpi .label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#666;margin-bottom:8px}
.kpi .value{font-size:28px;font-weight:800;letter-spacing:-1px}
.kpi .sub{font-size:13px;color:#555;margin-top:4px}
.kpi .value.purple{color:#8b5cf6}
.kpi .value.green{color:#16a34a}
.kpi .value.amber{color:#f59e0b}
.daily-chart{display:flex;align-items:flex-end;gap:3px;height:120px;padding:0 4px}
.daily-bar{flex:1;min-width:4px;border-radius:3px 3px 0 0;background:#8b5cf644;position:relative;transition:height .4s ease;cursor:pointer}
.daily-bar:hover{background:#8b5cf6}
.daily-bar .tooltip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #2a2a3e;border-radius:6px;padding:8px 12px;font-size:11px;white-space:nowrap;z-index:5;color:#e0e0e0;line-height:1.6}
.daily-bar:hover .tooltip{display:block}
.daily-labels{display:flex;gap:3px;padding:4px 4px 0}
.daily-labels span{flex:1;min-width:4px;text-align:center;font-size:9px;color:#444;overflow:hidden}
.grid{display:grid;grid-template-columns:1fr 360px;gap:20px;margin-bottom:24px}
@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}.hero-conv .hero-numbers{flex-direction:column;gap:12px}.hero-conv .hero-arrow{transform:rotate(90deg)}.daily-grid-3{grid-template-columns:1fr!important}}
.card{background:#0d0d1a;border:1px solid #1a1a2e;border-radius:12px;overflow:hidden;margin-bottom:20px}
.card-header{padding:16px 20px;border-bottom:1px solid #1a1a2e;display:flex;align-items:center;justify-content:space-between}
.card-header h2{font-size:14px;font-weight:700}
.card-header .badge{font-size:11px;padding:3px 8px;border-radius:4px;background:rgba(139,92,246,0.15);color:#8b5cf6;font-weight:600}
.card-body{padding:20px}
.bar-chart{display:flex;flex-direction:column;gap:12px}
.bar-row{display:grid;grid-template-columns:90px 1fr 60px;align-items:center;gap:12px}
.bar-label{font-size:12px;font-weight:600;color:#aaa;text-align:right}
.bar-track{height:28px;background:#111122;border-radius:6px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width 0.8s cubic-bezier(.25,.8,.25,1);position:relative;min-width:2px}
.bar-fill.winner{background:linear-gradient(90deg,#16a34a,#22c55e)}
.bar-fill .bar-inner-label{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:#fff;white-space:nowrap}
.bar-value{font-size:13px;font-weight:700}
.bar-value.winner-text{color:#16a34a}
.ts-card .variant-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #111122}
.ts-card .variant-row:last-child{border:none}
.ts-card .v-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;min-width:50px}
.ts-card .v-name .dot{width:10px;height:10px;border-radius:50%}
.ts-card .v-bar{flex:1;margin:0 12px;height:6px;background:#111122;border-radius:3px;overflow:hidden}
.ts-card .v-bar-fill{height:100%;border-radius:3px;transition:width 0.6s ease}
.ts-card .v-prob{font-size:14px;font-weight:800;min-width:50px;text-align:right}
.ts-card .v-prob.top{color:#16a34a}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;border-bottom:1px solid #1a1a2e}
td{padding:10px 12px;border-bottom:1px solid #0f0f1f}
tr:hover td{background:#0f0f1f}
.variant-tag{display:inline-flex;align-items:center;gap:6px;font-weight:600}
.variant-tag .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.winner-row td{background:rgba(22,163,106,0.05)}
.winner-badge{background:rgba(22,163,106,0.15);color:#16a34a;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;margin-left:6px}
.loser-badge{background:rgba(239,68,68,0.15);color:#ef4444;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;margin-left:6px}
.warmup-badge{background:rgba(139,92,246,0.15);color:#8b5cf6;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;margin-left:6px}
.url-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid #111122;font-size:13px}
.url-row:last-child{border:none}
.url-row .page{font-weight:600;color:#aaa;min-width:140px}
.url-row code{background:#111122;padding:4px 10px;border-radius:4px;font-size:12px;color:#8b5cf6;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace}
.copy-btn{background:#1a1a2e;border:1px solid #2a2a3e;color:#aaa;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.copy-btn:hover{background:#2a2a3e;color:#fff}
.copy-btn.copied{background:rgba(22,163,106,0.2);color:#16a34a;border-color:#16a34a}
.warning-banner{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:16px 20px;margin-bottom:20px;font-size:13px;color:#f59e0b;line-height:1.6}
.hour-cell:hover .hour-tooltip{display:block!important}
/* Editable layout */
#app > [data-card]{position:relative;transition:opacity .2s}
body.editing #app > [data-card]{outline:2px dashed rgba(139,92,246,0.4);outline-offset:4px;border-radius:14px;cursor:grab}
body.editing #app > [data-card].dragging{opacity:0.4;cursor:grabbing}
body.editing #app > [data-card].drag-over-top::before,
body.editing #app > [data-card].drag-over-bottom::after{content:'';position:absolute;left:0;right:0;height:3px;background:#8b5cf6;border-radius:2px}
body.editing #app > [data-card].drag-over-top::before{top:-6px}
body.editing #app > [data-card].drag-over-bottom::after{bottom:-6px}
.card-controls{display:none;position:absolute;top:8px;right:8px;z-index:5;gap:6px}
body.editing .card-controls{display:flex}
.card-ctrl-btn{background:#1a1a2e;border:1px solid #2a2a3e;color:#aaa;width:28px;height:28px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.card-ctrl-btn:hover{background:#2a2a3e;color:#fff}
.card-ctrl-btn.danger:hover{background:#ef4444;color:#fff;border-color:#ef4444}
.edit-bar{background:#0a0a14;border-bottom:1px solid #1a1a2e;padding:10px 24px;display:none;align-items:center;gap:12px;flex-wrap:wrap}
body.editing .edit-bar{display:flex}
.edit-bar select{background:#111122;border:1px solid #2a2a3e;color:#e0e0e0;padding:6px 10px;border-radius:6px;font-size:12px;font-family:inherit}
.skeleton{background:linear-gradient(90deg,#0d0d1a 25%,#1a1a2e 50%,#0d0d1a 75%);background-size:200% 100%;animation:sk-pulse 1.4s ease-in-out infinite;border-radius:10px;border:1px solid #1a1a2e}
@keyframes sk-pulse{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px}
.sk-kpi{height:96px}
.sk-hero{height:180px;margin-bottom:24px}
.sk-card{height:260px;margin-bottom:20px}
@media(max-width:1100px){.sk-kpi-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.sk-kpi-row{grid-template-columns:repeat(2,1fr)}}
.loading{text-align:center;padding:80px 20px;color:#555}
.loading .spinner{width:32px;height:32px;border:3px solid #1a1a2e;border-top-color:#8b5cf6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.no-data{text-align:center;padding:40px;color:#444;font-size:14px}
/* Traffic control */
.mode-btns{display:flex;gap:8px;margin-bottom:20px}
.mode-btn{flex:1;padding:12px 8px;border-radius:10px;border:2px solid #1a1a2e;background:#0a0a14;color:#888;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;text-align:center;transition:all .2s;line-height:1.4}
.mode-btn:hover{border-color:#333;color:#ccc}
.mode-btn.active-warmup{border-color:#8b5cf6;color:#8b5cf6;background:rgba(139,92,246,0.08)}
.mode-btn.active-thompson{border-color:#16a34a;color:#16a34a;background:rgba(22,163,106,0.08)}
.mode-btn.active-manual{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,0.08)}
.mode-btn .mode-icon{font-size:20px;display:block;margin-bottom:4px}
.mode-btn .mode-label{display:block;font-size:13px;font-weight:700}
.mode-btn .mode-desc{display:block;font-size:10px;font-weight:500;margin-top:2px;opacity:0.7}
.save-btn{padding:10px 24px;border-radius:8px;border:none;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s}
.save-btn:hover{transform:translateY(-1px)}
.save-btn.primary{background:#8b5cf6;color:#fff}
.save-btn.saved{background:#16a34a;color:#fff}
.save-bar{display:flex;align-items:center;gap:12px;margin-top:16px}
.save-bar .save-status{font-size:12px;color:#555}
/* Rotation */
.rot-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #111122;font-size:13px}
.rot-item:last-child{border:none}
.rot-item .ri-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rot-item .ri-info{flex:1;min-width:0}
.rot-item .ri-name{font-weight:600}
.rot-item .ri-stats{font-size:11px;color:#666;margin-top:2px}
.rot-item .ri-status{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:700}
.rot-btn{padding:4px 12px;border-radius:6px;border:1px solid;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s}
.rot-btn:hover{transform:translateY(-1px)}
.rot-btn.retire{border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.1);color:#ef4444}
.rot-btn.activate{border-color:rgba(22,163,106,0.4);background:rgba(22,163,106,0.1);color:#16a34a}
.rot-btn.requeue{border-color:rgba(139,92,246,0.4);background:rgba(139,92,246,0.1);color:#8b5cf6}
.toggle-switch{position:relative;width:44px;height:24px;cursor:pointer}
.toggle-switch input{display:none}
.toggle-switch .slider{position:absolute;inset:0;background:#1a1a2e;border-radius:12px;transition:.3s}
.toggle-switch .slider::before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#555;left:3px;top:3px;transition:.3s}
.toggle-switch input:checked+.slider{background:rgba(22,163,106,0.3)}
.toggle-switch input:checked+.slider::before{transform:translateX(20px);background:#16a34a}
.section-toggle{background:none;border:none;color:#8b5cf6;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;padding:0}
.section-toggle:hover{text-decoration:underline}
.log-row{display:grid;grid-template-columns:140px 80px 1fr;gap:8px;padding:8px 0;border-bottom:1px solid #111122;font-size:12px;color:#888}
.log-row:last-child{border:none}
.log-row .log-action{font-weight:700}
.log-row .log-action.auto-retire{color:#ef4444}
.log-row .log-action.retire{color:#f59e0b}
.log-row .log-action.activate{color:#16a34a}
.log-row .log-action.requeue{color:#8b5cf6}
</style>
</head>
<body>

<div class="top-bar">
  <h1><b>A/B</b> Testing Dashboard</h1>
  <div class="right" style="display:flex;align-items:center;gap:16px">
    <div style="display:flex;gap:6px">
      <a href="/resumen" style="padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;background:#1a1a2e;color:#888;border:1px solid #2a2a3e">Resumen</a>
      <a href="/panel" style="padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;background:#8b5cf6;color:#fff">General</a>
      <a href="/ranking" style="padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;background:#1a1a2e;color:#888;border:1px solid #2a2a3e">Ranking</a>
      <a href="/funnel" style="padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;background:#1a1a2e;color:#888;border:1px solid #2a2a3e">Funnel</a>
      <a href="/tendencias" style="padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;background:#1a1a2e;color:#888;border:1px solid #2a2a3e">Tendencias</a>
      <a href="/experimento" style="padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;background:#1a1a2e;color:#888;border:1px solid #2a2a3e">Experimento</a>
    </div>
    <span class="live">En vivo</span>
    <span id="lastUpdate">--</span>
  </div>
</div>

<div class="filter-bar">
  <label style="color:#8b5cf6;font-weight:700">Fuente</label>
  <div id="sourceToggle" style="display:flex;gap:4px;margin-right:8px">
    <button class="filter-btn source-btn" data-src="meta" onclick="setSource('meta')">Meta</button>
    <button class="filter-btn source-btn" data-src="youtube" onclick="setSource('youtube')">YouTube</button>
    <button class="filter-btn source-btn" data-src="all" onclick="setSource('all')">Todo</button>
  </div>
  <button type="button" id="datePickerBtn"></button>
  <input type="date" id="dateFrom" style="display:none">
  <input type="date" id="dateTo" style="display:none">
  <button class="filter-btn" onclick="loadData()" style="margin-left:auto">Actualizar</button>
  <button class="filter-btn" id="editLayoutBtn" onclick="toggleEditMode()" title="Personalizar qué tarjetas ves y en qué orden">✏️ Editar</button>
</div>
<script src="/js/date-picker.js"></script>

<div class="edit-bar">
  <strong style="color:#8b5cf6;font-size:12px;letter-spacing:1px">MODO EDITAR</strong>
  <span style="font-size:11px;color:#888">Arrastrá para reordenar · X para ocultar</span>
  <select id="addCardSelect" onchange="if(this.value){restoreCard(this.value);this.value=''}" style="margin-left:auto">
    <option value="">+ Agregar tarjeta oculta...</option>
  </select>
  <button class="filter-btn" onclick="resetLayout()">Restaurar todo</button>
  <button class="filter-btn green" onclick="toggleEditMode()">Listo</button>
</div>

<div class="container" id="app">
  <div class="sk-hero skeleton"></div>
  <div class="sk-kpi-row"><div class="skeleton sk-kpi"></div><div class="skeleton sk-kpi"></div><div class="skeleton sk-kpi"></div><div class="skeleton sk-kpi"></div><div class="skeleton sk-kpi"></div></div>
  <div class="skeleton sk-card"></div>
  <div class="skeleton sk-card"></div>
</div>

<script>
const DOMAIN = 'https://{{PUBLIC_URL}}';
let currentConfig = null;
let pendingWeights = {};
let showQueue = false;
let showRetired = false;
// Source filter: 'meta' | 'youtube' | 'all'. Persists in localStorage so the
// selected view survives reloads. 'all' is read-only (rotation/config writes
// must target meta or youtube, the backend falls back to meta in that case).
let currentSource = localStorage.getItem('ab_panel_source') || 'meta';
function setSource(src) {
  currentSource = src;
  localStorage.setItem('ab_panel_source', src);
  pendingWeights = {};
  updateSourceUI();
  loadData();
}
function updateSourceUI() {
  document.querySelectorAll('#sourceToggle .source-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.src === currentSource);
  });
}
function srcQS(prefix) {
  // Append source=X to a URL, using '?' or '&' as needed.
  return (prefix.includes('?') ? '&' : '?') + 'source=' + currentSource;
}

// ========================================================================
// EDITABLE LAYOUT (cards: hide / reorder / restore)
// State persisted in localStorage. Detection by class+content patterns,
// not by index, so optional cards (engagement) don't shift IDs.
// ========================================================================
const CARD_DEFS = [
  { id: 'recs',          name: '🎯 Recomendación',           detect: el => el.classList.contains('kpi-row') && el.querySelector('a[href*="/variante"]') },
  { id: 'hero',          name: '⭐ Funnel total (hero)',     detect: el => el.classList.contains('hero-conv') },
  { id: 'main-kpis',     name: '📊 KPIs principales',        detect: el => el.classList.contains('kpi-row') && el.textContent.includes('Mejor variante') },
  { id: 'engagement',    name: '🎮 Engagement (quiz/form)',  detect: el => el.classList.contains('kpi-row') && el.textContent.includes('Quiz: completados') },
  { id: 'dimensions',    name: '🌐 Hora + Device',           detect: el => el.classList.contains('grid') && el.textContent.includes('Conversión por hora') },
  { id: 'countries',     name: '🌎 Top países',              detect: el => el.classList.contains('card') && el.textContent.includes('Top países por tráfico') },
  { id: 'dimensions-banner', name: '🔬 Banner dimensiones (sin datos)', detect: el => el.classList.contains('warning-banner') && el.textContent.includes('Device / país / hora') },
  { id: 'checkpoint',    name: '🚩 Checkpoint del experimento', detect: el => el.classList.contains('card') && el.textContent.includes('Experimento Actual') },
  { id: 'mode',          name: '🎛️ Modo de tráfico',         detect: el => el.classList.contains('card') && el.textContent.includes('Modo de Tráfico') },
  { id: 'rotation',      name: '♻️ Auto-rotación',           detect: el => el.classList.contains('card') && el.textContent.includes('Auto-Rotacion') },
  { id: 'thompson',      name: '🎲 Thompson Sampling',        detect: el => el.classList.contains('card') && el.textContent.includes('Thompson Sampling') },
  { id: 'daily-history', name: '📈 Historico diario',         detect: el => el.classList.contains('card') && el.textContent.includes('Histórico') },

function loadLayout() {
  try {
    const raw = localStorage.getItem('ab_panel_layout');
    if (!raw) return { hidden: [], order: [] };
    return Object.assign({ hidden: [], order: [] }, JSON.parse(raw));
  } catch { return { hidden: [], order: [] }; }
}
function saveLayout(layout) {
  localStorage.setItem('ab_panel_layout', JSON.stringify(layout));
}

function tagCards() {
  const app = document.getElementById('app');
  if (!app) return [];
  const tagged = [];
  Array.from(app.children).forEach(el => {
    // Skip wrapper text nodes / empty divs
    if (!el.nodeType || el.nodeType !== 1) return;
    for (const def of CARD_DEFS) {
      try {
        if (def.detect(el)) {
          el.dataset.card = def.id;
          el.dataset.cardName = def.name;
          tagged.push(def.id);
          break;
        }
      } catch {}
    }
  });
  return tagged;
}

function applyLayout() {
  const tagged = tagCards();
  const layout = loadLayout();
  const app = document.getElementById('app');
  if (!app) return;

  // Hide
  app.querySelectorAll('[data-card]').forEach(el => {
    if (layout.hidden.includes(el.dataset.card)) el.style.display = 'none';
    else el.style.display = '';
  });

  // Reorder: any cards listed in layout.order go first in that order, the rest stay in natural order.
  if (layout.order.length > 0) {
    const ordered = [];
    layout.order.forEach(id => {
      const el = app.querySelector(`[data-card="${id}"]`);
      if (el) ordered.push(el);
    });
    // Append remaining (newly added cards) at the end
    Array.from(app.children).forEach(el => {
      if (el.dataset && el.dataset.card && !layout.order.includes(el.dataset.card)) ordered.push(el);
    });
    ordered.forEach(el => app.appendChild(el));
  }

  // Inject delete buttons + drag handlers (only once per card)
  app.querySelectorAll('[data-card]').forEach(el => {
    if (!el.querySelector('.card-controls')) {
      const ctrl = document.createElement('div');
      ctrl.className = 'card-controls';
      const cardId = el.dataset.card;
      ctrl.innerHTML = `
        <button class="card-ctrl-btn" title="Mover" onmousedown="event.stopPropagation()">⇅</button>
        <button class="card-ctrl-btn danger" title="Ocultar" onclick="hideCard('${cardId}');event.stopPropagation()">×</button>
      `;
      el.appendChild(ctrl);

      // Drag & drop
      el.draggable = true;
      el.addEventListener('dragstart', e => {
        if (!document.body.classList.contains('editing')) { e.preventDefault(); return; }
        e.dataTransfer.setData('text/plain', cardId);
        el.classList.add('dragging');
      });
      el.addEventListener('dragend', () => {
        el.classList.remove('dragging');
        app.querySelectorAll('[data-card]').forEach(x => x.classList.remove('drag-over-top','drag-over-bottom'));
      });
      el.addEventListener('dragover', e => {
        if (!document.body.classList.contains('editing')) return;
        e.preventDefault();
        const rect = el.getBoundingClientRect();
        const before = (e.clientY - rect.top) < rect.height / 2;
        el.classList.toggle('drag-over-top', before);
        el.classList.toggle('drag-over-bottom', !before);
      });
      el.addEventListener('dragleave', () => el.classList.remove('drag-over-top','drag-over-bottom'));
      el.addEventListener('drop', e => {
        if (!document.body.classList.contains('editing')) return;
        e.preventDefault();
        const draggedId = e.dataTransfer.getData('text/plain');
        if (!draggedId || draggedId === cardId) return;
        const dragged = app.querySelector(`[data-card="${draggedId}"]`);
        if (!dragged) return;
        const rect = el.getBoundingClientRect();
        const before = (e.clientY - rect.top) < rect.height / 2;
        if (before) app.insertBefore(dragged, el);
        else        app.insertBefore(dragged, el.nextSibling);
        el.classList.remove('drag-over-top','drag-over-bottom');
        // Persist new order
        const newOrder = Array.from(app.querySelectorAll('[data-card]')).map(x => x.dataset.card);
        const lay = loadLayout();
        lay.order = newOrder;
        saveLayout(lay);
      });
    }
  });

  // Refresh hidden-cards dropdown
  const sel = document.getElementById('addCardSelect');
  if (sel) {
    const opts = ['<option value="">+ Agregar tarjeta oculta...</option>'];
    layout.hidden.forEach(id => {
      const def = CARD_DEFS.find(d => d.id === id);
      if (def) opts.push(`<option value="${id}">${def.name}</option>`);
    });
    sel.innerHTML = opts.join('');
  }
}

// Wilson score interval at 95% confidence. Returns [lo, hi] as proportions.
// Way better than ± stderr for small samples — never crosses 0 or 1.
function wilsonInterval(successes, n, z) {
  z = z || 1.96;
  if (!n || n <= 0) return [0, 0];
  const p = successes / n;
  const z2 = z * z;
  const denom = 1 + z2 / n;
  const center = (p + z2 / (2 * n)) / denom;
  const margin = (z * Math.sqrt(p * (1 - p) / n + z2 / (4 * n * n))) / denom;
  return [Math.max(0, center - margin), Math.min(1, center + margin)];
}

// Format a conversion rate with its Wilson margin: "24.3 ± 3.1%"
function fmtCRwithCI(successes, n) {
  if (!n || n <= 0) return '—';
  const [lo, hi] = wilsonInterval(successes, n);
  const p = successes / n * 100;
  const margin = (hi - lo) * 100 / 2;
  return `${p.toFixed(1)} <span style="opacity:0.6;font-size:0.85em">± ${margin.toFixed(1)}</span>%`;
}

// Country code → flag emoji (offsetting ASCII letters into the regional
// indicator unicode block). Falls back to the raw ISO-2 code.
function flag(cc) {
  if (!cc || cc.length !== 2) return cc || '';
  const A = 0x1F1E6;
  return String.fromCodePoint(A + cc.charCodeAt(0) - 65) + String.fromCodePoint(A + cc.charCodeAt(1) - 65);
}

// Color a conversion rate cell green/amber/red based on absolute value.
function crColor(cr) {
  if (cr === null || cr === undefined) return '#555';
  if (cr >= 25) return '#16a34a';
  if (cr >= 15) return '#f59e0b';
  return '#ef4444';
}

// Render the 3 dimension cards (heatmap by hour / device split / top
// countries). Hidden entirely if no data with the new dimensions exists
// yet — avoids showing 3 empty cards before traffic accumulates.
// Build actionable recommendations from the active variants. Pure client-side
// — no extra fetch. Reads Thompson probabilities (already computed by
// /api/stats) plus Wilson confidence intervals on the conversion rate.
//
// Categories:
//   winner   → Thompson > 75% AND impressions > minImp.
//   retire   → Wilson lower bound < global avg AND impressions > 100.
//   needData → impressions < minImp; can't conclude anything yet.
//   promote  → variants in queue (front of the line) ready to test.
function buildRecommendations(data, cfg, rot) {
  const minImp = (rot && rot.rotationMinImpressions) || 150;
  const variants = (data.variants || []).filter(v => v.impressions > 0);
  if (variants.length === 0) return null;

  const totalImp = variants.reduce((s, v) => s + v.impressions, 0);
  const totalConv = variants.reduce((s, v) => s + v.conversions, 0);
  const globalCR = totalImp > 0 ? (totalConv / totalImp * 100) : 0;

  let winner = null;
  const retireList = [];
  const needDataList = [];
  for (const v of variants) {
    const [lo] = wilsonInterval(v.conversions, v.impressions);
    const loPct = lo * 100;
    if (v.impressions < minImp) {
      needDataList.push({ ...v, missing: minImp - v.impressions });
      continue;
    }
    if (v.thompsonProb !== null && v.thompsonProb > 75 && (winner === null || v.thompsonProb > winner.thompsonProb)) {
      winner = v;
    }
    if (loPct < globalCR && v.impressions >= 100) {
      retireList.push({ ...v, wilsonLo: loPct });
    }
  }
  retireList.sort((a, b) => a.wilsonLo - b.wilsonLo);
  needDataList.sort((a, b) => a.impressions - b.impressions);

  const queue = (rot && rot.queue) || [];
  const promoteList = queue.slice(0, 3);

  return { winner, retireList, needDataList, promoteList, globalCR, minImp };
}

function renderDimensions(dims) {
  if (!dims) return '';
  const totalImp = (dims.devices || []).reduce((s, d) => s + d.impressions, 0);
  if (totalImp < 5) {
    return `<div class="warning-banner" style="background:rgba(139,92,246,0.06);border-color:rgba(139,92,246,0.2);color:#aaa">

    </div>`;
  }

  // Heatmap by hour: 24 vertical bars, height = relative impressions,
  // color = conversion rate (green/amber/red).
  const maxHourImp = Math.max(...dims.heatmap.map(h => h.impressions), 1);
  const hourBars = dims.heatmap.map(h => {
    const heightPct = Math.max((h.impressions / maxHourImp) * 100, 2);
    const color = h.impressions > 0 ? crColor(h.conversionRate) : '#1a1a2e';
    const label = h.conversionRate !== null ? h.conversionRate.toFixed(1) + '%' : '—';

  const deviceRows = dims.devices.map(d => {
    const sharePct = (d.impressions / totalDevImp * 100);
    const color = crColor(d.conversionRate);
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #111122">
      <div style="min-width:110px;font-weight:600;color:#aaa">${deviceLabel[d.key] || d.key}</div>
      <div style="flex:1">
        <div style="height:8px;background:#111122;border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${sharePct}%;background:${color};border-radius:4px;transition:width .6s"></div>
        </div>
        <div style="font-size:11px;color:#666;margin-top:4px">${d.impressions.toLocaleString()} visitas (${sharePct.toFixed(0)}% del tráfico) · ${d.conversions} registros</div>
      </div>
      <div style="min-width:60px;text-align:right;font-weight:800;color:${color}">${d.conversionRate !== null ? d.conversionRate.toFixed(1) + '%' : '—'}</div>
    </div>`;
  }).join('');

  // Top countries: show the top 8 by traffic.
  const topCountries = (dims.countries || []).slice(0, 8);
  const totalCtyImp = topCountries.reduce((s, c) => s + c.impressions, 0) || 1;
  const countryRows = topCountries.map(c => {
    const sharePct = (c.impressions / totalCtyImp * 100);
    const color = crColor(c.conversionRate);
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #111122">
      <div style="min-width:80px;font-weight:600;color:#aaa;font-size:14px">${flag(c.key)} ${c.key}</div>
      <div style="flex:1">
        <div style="height:8px;background:#111122;border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${sharePct}%;background:${color};border-radius:4px"></div>

      </div>

  return `
    <div class="grid" style="grid-template-columns:1fr 360px;gap:20px;margin-bottom:24px">

      </div>
    </div>

    ${countryRows ? `
    <div class="card">
      <div class="card-header"><h2>Top países por tráfico</h2><span class="badge">${(dims.countries||[]).length} países</span></div>
      <div class="card-body">${countryRows}</div>
    </div>
    ` : ''}
  `;
}

function render(data) {
  const v = data.variants;
  const t = data.totals;
  const daily = data.daily || [];
  const cfg = data.config || {};
  const rot = data.rotation || {};
  currentConfig = cfg;

  if (!Object.keys(pendingWeights).length) {
    pendingWeights = { ...(cfg.weights || {}) };
    v.forEach(sv => { if (pendingWeights[sv.id] === undefined) pendingWeights[sv.id] = +(100 / v.length).toFixed(1); });
  }

  const sorted = [...v].sort((a,b) => b.conversionRate - a.conversionRate);
  const winnerId = t.impressions > 20 ? sorted[0]?.id : null;
  const avgRate = t.impressions > 0 ? (t.conversions / t.impressions * 100) : 0;
  const maxRate = sorted[0]?.conversionRate || 0;
  const qualRate = t.conversions > 0 ? (t.qualified / t.conversions * 100) : 0;
  const waRate = t.conversions > 0 ? ((t.whatsapp||0) / t.conversions * 100) : 0;

  document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('es-AR');
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  const dateLabel = from && to ? `${from} — ${to}` : 'Todo el periodo';

  // Daily metrics — build the FULL selected range so the chart reflects

  // ranges ("Máximo") fall back to only days-with-data to stay legible.
  const byDate = {};

  const rangeDays = (() => {

  const dailyActive = (rangeDays.length > 0 && rangeDays.length <= 120)

  const maxDailyImp = Math.max(...dailyActive.map(d=>d.impressions),1);
  const maxDailyConv = Math.max(...dailyActive.map(d=>d.conversions),1);
  const dailyCRs = dailyActive.map(d => d.impressions > 0 ? (d.conversions / d.impressions * 100) : 0);

  // Daily combo chart — pure CSS bars like the rest of the panel

    <div style="display:flex;gap:3px;padding:2px 4px 0">${dailyActive.map(d => `<span style="flex:1;min-width:4px;text-align:center;font-size:10px;color:#666">${d.impressions} → ${d.conversions}</span>`).join('')}</div>`;

  // Daily averages

  const avgQual = t.qualified / numDays;
  const avgWa = (t.whatsapp||0) / numDays;
  const avgCR = t.impressions > 0 ? (t.conversions / t.impressions * 100) : 0;

  // Daily summary table with totals + averages row
  const dailyTableHtml = dailyActive.length > 0 ? `<div class="table-wrap"><table>

      const isChampion = idx < protectTopN && sv.thompsonProb !== null;
      const tp = sv.thompsonProb !== null ? sv.thompsonProb.toFixed(1) + '%' : '--';
      const challengers = tournamentSort.slice(protectTopN);
      const worstChallenger = challengers.length > 0 ? challengers[challengers.length-1].id : null;
      const isNextOut = sv.id === worstChallenger && challengers.every(c => (c.round?.impressions||0) >= minImp);
      let statusBadge = '';
      if (isChampion) statusBadge = `<span style="background:rgba(245,158,11,0.15);border:1px solid #f59e0b;color:#f59e0b;font-size:10px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:0.5px">👑 CAMPEÓN</span>`;
      else if (isWarming) statusBadge = '<span class="warmup-badge">WARM-UP</span>';
      else if (isNextOut) statusBadge = `<span style="background:rgba(239,68,68,0.15);border:1px solid #ef4444;color:#ef4444;font-size:10px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:0.5px">⚠️ PRÓXIMA SALIDA</span>`;
      else statusBadge = `<span style="background:rgba(59,130,246,0.15);border:1px solid #3b82f6;color:#3b82f6;font-size:10px;font-weight:800;padding:3px 8px;border-radius:4px;letter-spacing:0.5px">⚔️ RETADOR</span>`;
      const pct = Math.min(roundImp / minImp * 100, 100);
      const barColor = isChampion ? '#f59e0b' : isWarming ? '#8b5cf6' : '#3b82f6';
      const progress = `<div style="margin-top:4px;height:4px;background:#1a1a2e;border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${barColor};border-radius:2px"></div></div><div style="font-size:10px;color:#555;margin-top:2px">Ronda: ${roundImp}/${minImp} · Histórico: ${ltImp.toLocaleString()} vis · ${ltRate.toFixed(1)}%</div>`;
      return `<tr class="${isChampion ? 'winner-row' : ''}">
        <td style="font-weight:800;color:${isChampion ? '#f59e0b' : '#555'}">${idx + 1}</td>
        <td><span class="variant-tag"><span class="dot" style="background:${varColor(sv.id)}"></span>${sv.id.toUpperCase()}</span> <span style="color:#888;font-size:11px">${sv.name}</span>${progress}</td>
        <td style="text-align:right"><div style="font-weight:700;color:#e0e0e0">${roundImp.toLocaleString()}</div><div style="font-size:10px;color:#666">hist: ${ltImp.toLocaleString()}</div></td>
        <td style="text-align:right"><div style="font-weight:700;color:#e0e0e0">${roundConv.toLocaleString()}</div><div style="font-size:10px;color:#666">hist: ${ltConv.toLocaleString()}</div></td>
        <td style="text-align:right"><div style="font-weight:800;color:${roundRate >= 25 ? '#16a34a' : roundRate >= 15 ? '#f59e0b' : roundImp < 20 ? '#555' : '#ef4444'}">${roundImp > 0 ? roundRate.toFixed(1) + '%' : '--'}</div><div style="font-size:10px;color:#666">hist: ${ltRate.toFixed(1)}%</div></td>
        <td style="text-align:right;font-weight:700;color:${sv.thompsonProb !== null && sv.thompsonProb > 50 ? '#16a34a' : '#888'}">${tp}</td>
        <td>${statusBadge}</td>
        <td><button class="rot-btn retire" onclick="retireVariant('${sv.id}')" style="font-size:10px;padding:2px 8px">Retirar</button></td>

  </table></div>`;

  // Queue
  const queueList = rot.queue || [];

  const logEntries = rot.log || [];
  const logHtml = logEntries.length > 0 ? logEntries.map(l => {
    const d = new Date(l.date);
    const ds = d.toLocaleDateString('es-AR',{day:'2-digit',month:'short'}) + ' ' + d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});

    if (l.variantOut && l.variantIn) detail = `${l.variantOut.toUpperCase()} → ${l.variantIn.toUpperCase()}`;
    else if (l.variantIn) detail = `+ ${l.variantIn.toUpperCase()}`;

    return `<div class="log-row"><span>${ds}</span><span class="log-action ${l.action}">${l.action}</span><span>${detail}${l.reason ? ' — '+l.reason : ''}</span></div>`;
  }).join('') : '<div style="color:#444;font-size:12px;padding:8px 0">Sin actividad de rotacion todavia.</div>';

  // Thompson desc
  let tsDesc = cfg.mode==='manual'
    ? 'Referencia: probabilidad de que cada variante sea la mejor. En modo manual no afecta el trafico.'
    : (cfg.mode==='warmup' && !warmup.complete)
      ? 'Probabilidad preliminar (warm-up activo).'
      : 'Probabilidad de que cada variante sea la mejor. El trafico se redirige a las ganadoras.';

  // Manual weights section
  const manualHtml = v.map(sv => {
    const w = parseFloat(pendingWeights[sv.id]) || 0;
    return `<div style="display:grid;grid-template-columns:70px 1fr 70px 50px;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #111122">
      <div style="font-size:12px;font-weight:600;color:#aaa;display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${varColor(sv.id)};flex-shrink:0"></span>${sv.id.toUpperCase()}</div>
      <input type="range" min="0" max="100" step="0.5" value="${w}" oninput="updateWeight('${sv.id}',this.value)" style="width:100%;accent-color:#f59e0b;cursor:pointer">

  const recs = buildRecommendations(data, cfg, rot);

  document.getElementById('app').innerHTML = `

      <div class="kpi"><div class="label">Mejor variante</div><div class="value green">${maxRate.toFixed(1)}%</div><div class="sub">${winnerId ? (data.variants.find(x=>x.id===winnerId)?.name||winnerId) : 'Esperando...'}</div></div>
    </div>

    ${data.engagement && (data.engagement.quizStart>0 || data.engagement.exitShown>0 || data.engagement.formStart>0) ? `

    ${data.engagement && data.engagement.timingTest && data.engagement.timingTest.some(b=>b.impressions>0) ? `

              return `

                  <div class="label">${fmtLabel(b)}${isWin?' ★':''}</div>
                  <div class="value" style="color:${color}">${b.conversionRate!==null?b.conversionRate.toFixed(1)+'%':'—'}</div>

                </div>
              `;
            }).join('');
          })()}
        </div>
      </div>

        <div class="card-body">
          <p style="font-size:12px;color:#555;margin-bottom:16px">${tsDesc}</p>
          ${[...v].sort((a,b)=>(b.thompsonProb??-1)-(a.thompsonProb??-1)).map((sv,i) => `<div class="variant-row"><div class="v-name"><span class="dot" style="background:${varColor(sv.id)}"></span>${sv.id.toUpperCase()}</div><div class="v-bar"><div class="v-bar-fill" style="width:${sv.thompsonProb??0}%;background:${varColor(sv.id)}"></div></div><div class="v-prob ${i===0&&t.impressions>20?'top':''}">${(sv.thompsonProb !== null ? sv.thompsonProb.toFixed(1) : '--')}%</div></div>`).join('')}
        </div>
      </div>
    </div>

    <!-- DETAIL TABLE -->
    <div class="card">
      <div class="card-header"><h2>Detalle por Variante</h2></div>
      <div class="card-body table-wrap">
        <table>
          <thead><tr><th>Variante</th><th>Estilo</th><th style="text-align:right">Visitas</th><th style="text-align:right">Registros</th><th style="text-align:right">Calificados</th><th style="text-align:right">WhatsApp</th><th style="text-align:right">Conv. Rate</th><th style="text-align:right">% Calificados</th><th style="text-align:right">% WhatsApp</th><th style="text-align:right">Thompson</th></tr></thead>
          <tbody>${v.map(sv => {
            const isW = sv.id===winnerId;
            const isLoser = candidates.includes(sv.id);
            const isWarmup = sv.impressions < (rot.rotationMinImpressions||200);
            let badge = '';
            if (isW) badge = '<span class="winner-badge">GANADORA</span>';
            else if (isLoser) badge = '<span class="loser-badge">PERDEDORA</span>';
            else if (isWarmup) badge = '<span class="warmup-badge">WARM-UP</span>';
            return `<tr class="${isW?'winner-row':''}"><td><span class="variant-tag"><span class="dot" style="background:${varColor(sv.id)}"></span>${sv.id.toUpperCase()}</span>${badge}</td><td>${sv.name}</td><td style="text-align:right;font-weight:600">${sv.impressions.toLocaleString()}</td><td style="text-align:right;font-weight:600">${sv.conversions.toLocaleString()}</td><td style="text-align:right;font-weight:600">${sv.qualified.toLocaleString()}</td><td style="text-align:right;font-weight:600">${(sv.whatsapp||0).toLocaleString()}</td><td style="text-align:right;font-weight:700;color:${isW?'#16a34a':'#e0e0e0'}">${sv.conversionRate.toFixed(2)}%</td><td style="text-align:right">${sv.qualifiedRate.toFixed(1)}%</td><td style="text-align:right;color:#16a34a">${(sv.whatsappRate||0).toFixed(1)}%</td><td style="text-align:right;font-weight:700">${(sv.thompsonProb !== null ? sv.thompsonProb.toFixed(1) : '--')}%</td></tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>

    <!-- ROTATION LOG -->
    <div class="card">
      <div class="card-header"><h2>Historial de Rotacion</h2><span class="badge">${logEntries.length} eventos</span></div>
      <div class="card-body">${logHtml}</div>
    </div>

    <!-- PROVESOURCE -->
    <div class="card">
      <div class="card-header"><h2>URLs para ProveSource</h2><span class="badge">COPIAR</span></div>
      <div class="card-body">
        <p style="font-size:12px;color:#555;margin-bottom:16px">URLs de las paginas activas.</p>
        ${[{page:'Rotador (Meta ads)',url:DOMAIN},{page:'Rotador (YouTube ads)',url:DOMAIN+'/yt'},...v.map(sv=>({page:sv.id.toUpperCase()+' - '+sv.name,url:DOMAIN+'/'+sv.file})),{page:'Gracias (calif.)',url:DOMAIN+'/gracias-calificado'},{page:'Gracias (no calif.)',url:DOMAIN+'/gracias-no-calificado'}].map(u=>`<div class="url-row"><span class="page">${u.page}</span><code>${u.url}</code><button class="copy-btn" onclick="copyUrl(this,'${u.url}')">Copiar</button></div>`).join('')}
      </div>
    </div>
  `;
  recalcTotal();
  applyLayout();
}

// --- Actions ---
function setMode(mode) {
  currentConfig.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.className='mode-btn');
  event.currentTarget.classList.add('active-'+mode);
  document.getElementById('warmupSection').style.display = mode==='warmup'?'flex':'none';
  document.getElementById('manualSection').style.display = mode==='manual'?'block':'none';
  document.getElementById('saveStatus').textContent = 'Cambios sin guardar';
  document.getElementById('saveStatus').style.color = '#f59e0b';
}

function updateWeight(id, val) {
  val = Math.max(0,Math.min(100,parseFloat(val)||0));
  pendingWeights[id] = val;
  const num = document.getElementById('wnum_'+id);
  const pct = document.getElementById('wpct_'+id);
  if (num) num.value = val;
  if (pct) pct.textContent = val.toFixed(1)+'%';
  // sync slider
  const sliders = document.querySelectorAll('#manualSection input[type="range"]');
  sliders.forEach(s => { if (s.oninput && s.oninput.toString().includes(id)) s.value = val; });
  recalcTotal();
  document.getElementById('saveStatus').textContent = 'Cambios sin guardar';
  document.getElementById('saveStatus').style.color = '#f59e0b';
}

function recalcTotal() {
  const el = document.getElementById('weightTotal');
  if (!el) return;
  const total = Object.values(pendingWeights).reduce((s,w)=>s+(parseFloat(w)||0),0);
  el.textContent = total.toFixed(1)+'%';
  el.style.color = Math.abs(total-100)<0.5 ? '#16a34a' : '#ef4444';
}

function saveConfig() {
  const btn = document.getElementById('saveBtn');
  const status = document.getElementById('saveStatus');
  btn.textContent = 'Guardando...'; btn.disabled = true;
  const body = { mode: currentConfig.mode };
  if (currentConfig.mode==='warmup') body.warmupMin = parseInt(document.getElementById('warmupMin')?.value)||200;
  if (currentConfig.mode==='manual') { body.weights = {}; Object.keys(pendingWeights).forEach(id=>{body.weights[id]=parseFloat(pendingWeights[id])||0;}); }
  fetch(configUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json()).then(()=>{
    btn.textContent='Guardado!'; btn.className='save-btn saved'; status.textContent='OK'; status.style.color='#16a34a';
    setTimeout(()=>{btn.textContent='Guardar configuracion';btn.className='save-btn primary';btn.disabled=false;loadData();},1500);
  }).catch(e=>{btn.textContent='Error';btn.className='save-btn primary';btn.disabled=false;status.textContent=e.message;status.style.color='#ef4444';});
}

function retireVariant(id) {
  if (!confirm('Retirar '+id.toUpperCase()+'? La siguiente variante de la cola entrara en su lugar.')) return;
  fetch(configUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'retire',variantId:id})}).then(r=>r.json()).then(()=>{pendingWeights={};loadData();});
}

function activateVariant(id) {
  fetch(configUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'activate',variantId:id})}).then(r=>r.json()).then(()=>{pendingWeights={};loadData();});
}

function requeueVariant(id) {
  fetch(configUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'requeue',variantId:id})}).then(r=>r.json()).then(()=>{pendingWeights={};loadData();});
}

function toggleAutoRotate(val) {
  fetch(configUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({autoRotate:val})}).then(r=>r.json()).then(()=>loadData());
}

function resetExperimentNow() {
  if (!confirm('Marcar el checkpoint AHORA. Thompson y analytics van a usar SOLO eventos de aca en adelante. Los eventos previos quedan en el historial. Continuar?')) return;
  fetch(configUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'resetExperiment',reason:'manual-now'})}).then(r=>r.json()).then(()=>loadData());
}
function resetExperimentTomorrow() {
  // Tomorrow 00:00 in Argentina (UTC-3), expressed as a UTC ISO string
  const now = new Date();
  // Build ART midnight: take ART date, add 1 day, set hour 00:00 ART => 03:00 UTC
  const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
  const artNow = new Date(utcMs - 3 * 3600000);
  const tomorrowArt = new Date(Date.UTC(artNow.getUTCFullYear(), artNow.getUTCMonth(), artNow.getUTCDate() + 1, 0, 0, 0));
  // Convert ART midnight back to UTC: ART = UTC - 3, so UTC = ART + 3
  const target = new Date(tomorrowArt.getTime() + 3 * 3600000);
  const iso = target.toISOString();
  if (!confirm('Marcar checkpoint para mañana 00:00 ART (' + target.toLocaleString('es-AR') + '). Continuar?')) return;
  fetch(configUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'resetExperiment',at:iso,reason:'tomorrow-midnight-ART'})}).then(r=>r.json()).then(()=>loadData());
}
function resetExperimentCustom() {
  const el = document.getElementById('customCheckpoint');
  if (!el || !el.value) { alert('Elegi una fecha y hora'); return; }
  const d = new Date(el.value);
  if (isNaN(d.getTime())) { alert('Fecha invalida'); return; }
  if (!confirm('Marcar checkpoint en ' + d.toLocaleString('es-AR') + '. Continuar?')) return;
  fetch(configUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'resetExperiment',at:d.toISOString(),reason:'custom-date'})}).then(r=>r.json()).then(()=>loadData());
}
function clearExperimentStart() {
  if (!confirm('Quitar el checkpoint? Thompson y analytics van a volver a ver todo el historial. Continuar?')) return;
  fetch(configUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'clearExperimentStart',reason:'manual-clear'})}).then(r=>r.json()).then(()=>loadData());
}

function saveRotationSettings() {
  const minImp = parseInt(document.getElementById('rotMinImp')?.value)||500;
  const protectTopN = parseInt(document.getElementById('rotProtect')?.value)||2;
  fetch(configUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({rotationMinImpressions:minImp,protectTopN:protectTopN})}).then(r=>r.json()).then(()=>loadData());
}
function startNewRound() {
  if (!confirm('Iniciar una ronda nueva ahora? Las visitas/registros de la ronda actual quedan en el histórico, pero el contador de ronda arranca de cero para todas las activas. Continuar?')) return;
  fetch(configUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'startNewRound',reason:'manual'})}).then(r=>r.json()).then(()=>loadData());
}

function copyUrl(btn, url) {
  navigator.clipboard.writeText(url).then(()=>{btn.textContent='Copiado!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copiar';btn.classList.remove('copied');},2000);});
}

updateSourceUI();
DatePicker.mount(document.getElementById('datePickerBtn'), { syncInputs: true, onChange: loadData });
loadData();
setInterval(loadData, 15000);
</script>
